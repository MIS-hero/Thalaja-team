<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); padding: 22px; }
  .grid { display: flex; flex-direction: column; gap: 20px; }
  .label { font-family: var(--font-body); font-size: 11px; font-weight: 700; letter-spacing: .04em;
           text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }

</style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, IconButton, Badge, Avatar, AvatarGroup, Card } = window.ThalajaDesignSystem_ed2185;
    const Plus = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>;
    const Bell = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M6 8a6 6 0 0112 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 003.4 0"/></svg>;
    function Demo() {
      return (
        <div className="grid">
          <div>
            <div className="label">Buttons</div>
            <div className="row">
              <Button variant="primary" iconLeft={<Plus/>}>Add item</Button>
              <Button variant="secondary">Invite</Button>
              <Button variant="mint">Confirm</Button>
              <Button variant="outline">Edit</Button>
              <Button variant="ghost">Skip</Button>
              <Button variant="primary" disabled>Disabled</Button>
            </div>
          </div>
          <div>
            <div className="label">Icon buttons · Badges</div>
            <div className="row">
              <IconButton tone="red" variant="solid" ariaLabel="add"><Plus/></IconButton>
              <IconButton tone="indigo" variant="soft" ariaLabel="alerts"><Bell/></IconButton>
              <IconButton tone="navy" variant="outline" ariaLabel="add"><Plus/></IconButton>
              <Badge tone="mint" dot>In stock</Badge>
              <Badge tone="red" variant="solid">3</Badge>
              <Badge tone="indigo">Shared</Badge>
              <Badge tone="lilac">Dairy</Badge>
            </div>
          </div>
          <div>

            <div className="row">
              <Avatar name="Reem Otaibi" size={44} />
              <Avatar name="Khalid" shape="blob" size={48} />
              <AvatarGroup size={36}>
                <Avatar name="Reem"/><Avatar name="Sara"/><Avatar name="Nora"/><Avatar name="Faisal"/><Avatar name="Mona"/>
              </AvatarGroup>
              <Card variant="pop" padding="sm" style={{minWidth:120}}>
                <b style={{fontFamily:'var(--font-display)'}}>Pop card</b>
              </Card>
              <Card tone="mint" padding="sm" style={{minWidth:110}}>Tinted</Card>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
