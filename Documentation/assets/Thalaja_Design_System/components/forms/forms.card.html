<!-- @dsCard group="Components" viewport="700x360" name="Forms — inputs, checkbox, stepper, segments" subtitle="Text fields, checkboxes, quantity steppers and segmented control" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); padding: 22px; }
  .grid { display: flex; flex-direction: column; gap: 18px; }
  .label { font-family: var(--font-body); font-size: 11px; font-weight: 700; letter-spacing: .04em;
           text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
  .row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
</style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Input, Checkbox, QtyStepper, SegmentedControl } = window.ThalajaDesignSystem_ed2185;
    const Search = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>;
    function Demo() {
      const [c1,setC1] = React.useState(true);
      const [c2,setC2] = React.useState(false);
      const [q,setQ] = React.useState(2);
      const [tab,setTab] = React.useState('todo');
      return (
        <div className="grid">
          <div>
            <div className="label">Inputs</div>
            <div className="row" style={{alignItems:'flex-start'}}>
              <Input label="Search items" placeholder="e.g. Laban" iconLeft={<Search/>} style={{width:220}} />
              <Input label="Quantity" error="Required" placeholder="0" style={{width:150}} />
            </div>
          </div>
          <div>
            <div className="label">Checkbox · Stepper</div>
            <div className="row">
              <Checkbox checked={c1} onChange={setC1} label="Eggs (1 tray)" />
              <Checkbox checked={c2} onChange={setC2} label="Bread" />
              <QtyStepper value={q} onChange={setQ} unit="kg" />
            </div>
          </div>
          <div>
            <div className="label">Segmented control</div>
            <div className="row">
              <SegmentedControl value={tab} onChange={setTab}
                options={[{value:'todo',label:'To buy',badge:8},{value:'done',label:'Bought',badge:3}]} />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
