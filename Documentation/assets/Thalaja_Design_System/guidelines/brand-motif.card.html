<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--red); padding: 20px; font-family: var(--font-body); }
  .stage { display: flex; gap: 26px; align-items: center; }
  .blob { position: relative; display: grid; place-items: center; }
  .blob svg { display: block; }
  .blob .inner { position: absolute; }
  .note { color: var(--cream); max-width: 230px; }
  .note h4 { font-family: var(--font-display); font-size: 24px; margin: 0 0 6px; }
  .note p { margin: 0; font-size: 13px; opacity: .92; }
</style>
</head>
<body>
  <div class="stage">
    <!-- lilac blob with stars -->
    <div class="blob" style="color:var(--lilac)">
      <svg viewBox="0 0 220 220" width="150" height="150"><path d="M 123.7 22.3 Q 110.0 10.0 123.7 22.3 Q 137.4 34.6 154.9 35.1 Q 172.4 35.7 175.7 52.9 Q 179.1 70.1 194.1 81.3 Q 209.1 92.5 196.7 107.8 Q 184.2 123.1 191.6 142.3 Q 199.1 161.4 179.2 165.1 Q 159.4 168.9 151.6 185.8 Q 143.8 202.7 126.9 196.8 Q 110.0 190.9 93.3 196.2 Q 76.7 201.6 68.1 185.9 Q 59.5 170.1 40.7 165.5 Q 21.8 160.9 29.0 142.0 Q 36.1 123.0 22.8 107.6 Q 9.4 92.3 25.9 81.6 Q 42.3 70.9 44.8 53.1 Q 47.2 35.2 64.8 34.6 Q 82.3 33.9 96.2 22.0 Z" fill="currentColor" stroke="var(--cream)" stroke-width="6"></path></svg>
    </div>
    <!-- mint blob -->
    <div class="blob" style="color:var(--mint)">
      <svg viewBox="0 0 220 220" width="118" height="118"><path d="M 123.7 22.3 Q 110.0 10.0 123.7 22.3 Q 137.4 34.6 154.9 35.1 Q 172.4 35.7 175.7 52.9 Q 179.1 70.1 194.1 81.3 Q 209.1 92.5 196.7 107.8 Q 184.2 123.1 191.6 142.3 Q 199.1 161.4 179.2 165.1 Q 159.4 168.9 151.6 185.8 Q 143.8 202.7 126.9 196.8 Q 110.0 190.9 93.3 196.2 Q 76.7 201.6 68.1 185.9 Q 59.5 170.1 40.7 165.5 Q 21.8 160.9 29.0 142.0 Q 36.1 123.0 22.8 107.6 Q 9.4 92.3 25.9 81.6 Q 42.3 70.9 44.8 53.1 Q 47.2 35.2 64.8 34.6 Q 82.3 33.9 96.2 22.0 Z" fill="currentColor" stroke="var(--cream)" stroke-width="6"></path></svg>
    </div>
    <!-- indigo blob -->
    <div class="blob" style="color:var(--indigo)">
      <svg viewBox="0 0 220 220" width="100" height="100"><path d="M 123.7 22.3 Q 110.0 10.0 123.7 22.3 Q 137.4 34.6 154.9 35.1 Q 172.4 35.7 175.7 52.9 Q 179.1 70.1 194.1 81.3 Q 209.1 92.5 196.7 107.8 Q 184.2 123.1 191.6 142.3 Q 199.1 161.4 179.2 165.1 Q 159.4 168.9 151.6 185.8 Q 143.8 202.7 126.9 196.8 Q 110.0 190.9 93.3 196.2 Q 76.7 201.6 68.1 185.9 Q 59.5 170.1 40.7 165.5 Q 21.8 160.9 29.0 142.0 Q 36.1 123.0 22.8 107.6 Q 9.4 92.3 25.9 81.6 Q 42.3 70.9 44.8 53.1 Q 47.2 35.2 64.8 34.6 Q 82.3 33.9 96.2 22.0 Z" fill="currentColor" stroke="var(--cream)" stroke-width="6"></path></svg>
    </div>
    <div class="note">
      <h4>Sticker stack</h4>
      <p>Blobs nest and overlap with a cream halo stroke. Use them as avatars, empty-state art, and category badges.</p>
    </div>
  </div>
</body>
</html>
