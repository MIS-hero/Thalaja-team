<!-- @dsCard group="Type" viewport="700x210" name="Body — Tajawal" subtitle="Clean bilingual UI text across sizes & weights" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); padding: 18px 20px; color: var(--text-body); font-family: var(--font-body); }
  .line { margin-bottom: 7px; }
  .tag { display:inline-block; width: 92px; font-size: 10px; color: var(--text-muted); font-weight: 700; }
</style>
</head>
<body>
  <div class="line"><span class="tag">body-lg 18</span><span style="font-size:18px">Add milk, eggs and bread to the weekend run.</span></div>
  <div class="line"><span class="tag">body 16</span><span style="font-size:16px;font-weight:500">Shared with Al-Otaibi household · 4 members</span></div>
  <div class="line"><span class="tag">body-sm 14</span><span style="font-size:14px">Reem checked off 3 items a moment ago.</span></div>
  <div class="line"><span class="tag">caption 13</span><span style="font-size:13px;color:var(--text-muted)">Updated just now</span></div>
  <div class="line" dir="rtl"><span style="font-size:16px;font-weight:500">أضف الحليب والبيض والخبز لقائمة نهاية الأسبوع.</span></div>
</body>
</html>
