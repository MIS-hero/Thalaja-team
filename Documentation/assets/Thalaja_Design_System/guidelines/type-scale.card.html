<!-- @dsCard group="Type" viewport="700x150" name="Type scale" subtitle="The full step ramp from micro labels to hero display" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); padding: 16px 20px; color: var(--text-strong); font-family: var(--font-body); }
  .scale { display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap; }
  .s { display: flex; align-items: baseline; gap: 6px; }
  .s b { font-weight: 700; }
  .s small { font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="scale">
    <div class="s"><b style="font-size:64px">Aa</b><small>64</small></div>
    <div class="s"><b style="font-size:48px">Aa</b><small>48</small></div>
    <div class="s"><b style="font-size:36px">Aa</b><small>36</small></div>
    <div class="s"><b style="font-size:28px">Aa</b><small>28</small></div>
    <div class="s"><b style="font-size:22px">Aa</b><small>22</small></div>
    <div class="s"><b style="font-size:16px">Aa</b><small>16</small></div>
    <div class="s"><b style="font-size:13px">Aa</b><small>13</small></div>
  </div>
</body>
</html>
