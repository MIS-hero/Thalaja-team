<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); padding: 20px; font-family: var(--font-body); }
  .row { display: flex; align-items: center; gap: 28px; }
  .tile { width: 140px; height: 140px; border-radius: var(--radius-2xl); overflow: hidden; box-shadow: var(--shadow-md); flex: none; }
  .tile img { width: 100%; height: 100%; display: block; }
  .swatch-row { display: flex; gap: 8px; margin-top: 14px; }
  .swatch-row span { width: 28px; height: 28px; border-radius: 8px; box-shadow: inset 0 0 0 1.5px rgba(13,0,80,.08); }
  h3 { font-family: var(--font-display); color: var(--text-strong); font-size: 30px; margin: 0 0 4px; }
  p { color: var(--text-muted); margin: 0; font-size: 14px; max-width: 360px; }
  .ar { font-family: var(--font-display); direction: rtl; font-size: 40px; color: var(--red); margin-top: 6px; }
</style>
</head>
<body>
  <div class="row">
    <div class="tile"><img src="../assets/logo-app-icon.png" alt="Thalaja app icon"></div>
    <div>
      <h3>Thalaja · ثلاجة</h3>
      <p>"The fridge." A red starburst sticker floats on an indigo tile, anchored by a heavy navy outline and mint accent dots. Always keep the bold stroke and generous corner rounding.</p>
      <div class="swatch-row">
        <span style="background:var(--indigo)"></span>
        <span style="background:var(--red)"></span>
        <span style="background:var(--navy)"></span>
        <span style="background:var(--mint)"></span>
      </div>
    </div>
  </div>
</body>
</html>
